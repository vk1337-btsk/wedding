<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Администрирование свадьбы</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="admin-shell">
      <header class="admin-header">
        <h1>Панель администратора</h1>
        <p>Управление приглашениями, ответами и статистикой.</p>
      </header>

      <!-- Статистика -->
      <section class="admin-section">
        <h2>Статистика</h2>
        <div class="stats-grid" id="statsGrid"></div>
      </section>

      <!-- Приглашения -->
      <section class="admin-section">
        <h2>Приглашения</h2>
        <form id="invitationForm" class="admin-form">
          <input type="hidden" id="invitationId" />
          <div class="form-group">
            <label>Приветствие гостей</label>
            <input id="guestNameInput" type="text" placeholder="Дорогой Сергей" required />
          </div>
          <div class="form-group full-width">
            <label>Текст приглашения</label>
            <textarea id="inviteTextInput" rows="3" placeholder="Ваш текст приглашения" required></textarea>
          </div>
          <div class="form-group">
            <label>Код ссылки (необязательно)</label>
            <input id="inviteCodeInput" type="text" placeholder="A1B2C3" />
          </div>
          <button type="submit">Сохранить приглашение</button>
        </form>
        <div id="invitationsList" class="admin-table"></div>
      </section>

      <!-- Ответы -->
      <section class="admin-section">
        <h2>Ответы гостей</h2>
        <form id="responseForm" class="admin-form">
          <input type="hidden" id="responseId" />
          <div class="form-group">
            <label>Гость (выберите из списка)</label>
            <select id="responseInvitationSelect" required>
              <option value="">-- Выберите гостя --</option>
            </select>
          </div>
          <div class="form-group">
            <label>Придёт?</label>
            <select id="responseWillCome" required>
              <option value="yes">Да</option>
              <option value="no">Нет</option>
            </select>
          </div>
          <div class="form-group full-width">
            <label>Пояснение</label>
            <input id="responseComment" type="text" placeholder="Краткий комментарий" />
          </div>
          <div class="inline-group">
            <div class="form-group">
              <label>Аллергии?</label>
              <select id="responseAllergies">
                <option value="no">Нет</option>
                <option value="yes">Да</option>
              </select>
            </div>
            <div class="form-group">
              <label>Будет алкоголь?</label>
              <select id="responseAlcohol">
                <option value="no">Нет</option>
                <option value="yes">Да</option>
              </select>
            </div>
          </div>
          <div class="form-group full-width">
            <label>Описание аллергий</label>
            <input id="responseAllergiesDetails" type="text" placeholder="Если есть аллергии, укажите какие" />
          </div>
          <div class="form-group full-width">
            <label>Дополнительная информация</label>
            <textarea id="responseAdditionalInfo" rows="2" placeholder="Любые пожелания или комментарии"></textarea>
          </div>
          <button type="submit">Сохранить ответ</button>
        </form>
        <div id="responsesList" class="admin-table"></div>
      </section>
    </main>
    <script src="/static/admin.js"></script>
  </body>
</html>
